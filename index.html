<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0b09" />
  <title>SmartApp</title>

  <!-- Fonts: Instrument Serif (display) + JetBrains Mono (UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" />

  <link rel="stylesheet" href="./app.css" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
</head>

<body>
  <!-- Status bar: persistent across launcher + modules -->
  <header class="topbar" id="topbar">
    <div class="topbar__left">
      <button class="avatar" id="avatar" title="Set profile picture">
        <span class="avatar__initial" id="avatar-initial">N</span>
      </button>
      <span class="topbar__id" id="topbar-id">
        <span class="topbar__brand">SMARTAPP</span>
        <span class="topbar__sep">/</span>
        <span class="topbar__by">BY NIK</span>
      </span>
    </div>
    <div class="topbar__center" id="topbar-title">HOME</div>
    <div class="topbar__right">
      <span id="clock">--:--</span>
      <button class="topbar__gear" id="open-settings" title="Settings">⚙</button>
    </div>
  </header>

  <!-- Main view container: launcher OR active module renders here -->
  <main id="view" class="view"></main>

  <!-- Bottom ruler -->
  <footer class="ruler" aria-hidden="true">
    <div class="ruler__track"></div>
    <div class="ruler__by">by Nik</div>
  </footer>

  <!-- Hidden file input for avatar upload -->
  <input type="file" id="avatar-input" accept="image/*" hidden>

  <!-- Boot the app -->
  <script type="module">
    import { startApp } from './core/router.js';
    startApp();
  </script>
</body>
</html>
